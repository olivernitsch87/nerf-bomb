<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nerf Bombenentschärfung</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Bombe entschärfen</h1>

  <label>
    Haltezeit (Sekunden):
    <input type="number" id="holdTimeInput" value="5" min="1" max="30">
  </label>
  <label>
    Countdown-Länge (Sekunden):
    <input type="number" id="countdownInput" value="45" min="10" max="300">
  </label>

  <button id="armButton">Bombe scharf machen (Team A)</button>
  <button id="defuseButton">Bombe entschärfen (Team B)</button>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="countdown" id="timerDisplay"></div>

  <audio id="beep" src="beep_short.ogg"></audio>
  <audio id="explosion" src="explosion.mp3"></audio>

  <script src="script.js" defer></script>
</body>
</html>
